#mybatis-plus配置
mybatis-plus:
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: false
    # 仅在开发环境下打印日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 逻辑删除配置
  global-config:
    # 开启sql执行分析插件(阻止全表更新与删除)
    enable-sql-runner: true
    db-config:
      # 逻辑删除字段
      logic-delete-field: isDelete
      # 逻辑未删除值(默认为0)
      logic-not-delete-value: 0
      # 逻辑删除值(默认为1)
      logic-delete-value: 1

#接口文档Knife4j配置
knife4j:
  enable: true
  openapi:
    title: 接口文档
    version: v1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.xcw.picturebackend.controller