server {
    listen 80;
    listen [::]:80;
    server_name picture.xucanwei.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name picture.xucanwei.xyz;
    index index.html index.htm;
    root /www/wwwroot/picture-frontend;

    # ----- replace with your real cert path -----
    ssl_certificate     /www/server/panel/vhost/cert/picture.xucanwei.xyz/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/picture.xucanwei.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 10m;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # do not expose hidden files
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }

    # cert challenge
    location ~ \.well-known {
        allow all;
    }

    # deny dynamic script in cert validation path
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    # anti crawler fast reject
    if ($block_bad_ua = 1) {
        return 403;
    }

    # static files
    location ~* \.(gif|jpg|jpeg|png|bmp|webp|svg|ico|css|js|woff|woff2|ttf)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # websocket handshake and connection controls
    location /api/ws {
        limit_req zone=ws_handshake_per_ip burst=20 nodelay;
        limit_conn conn_per_ip 120;

        proxy_pass http://127.0.0.1:8123;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }

    # api proxy
    location /api/ {
        limit_req zone=api_per_ip burst=40 nodelay;

        if ($request_method ~* "(POST|PUT|PATCH|DELETE)") {
            limit_req zone=api_write_per_ip burst=20 nodelay;
        }

        proxy_pass http://127.0.0.1:8123;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        add_header Retry-After 1 always;
    }

    # spa fallback
    location / {
        try_files $uri $uri/index.html /index.html;
    }

    error_page 404 /404.html;
    access_log /www/wwwlogs/www.xucanwei.xyz.log;
    error_log  /www/wwwlogs/www.xucanwei.xyz.error.log warn;
}
