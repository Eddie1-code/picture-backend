# Put this file inside the nginx `http {}` block once.
# Example include path (BT panel): /www/server/panel/vhost/nginx/global-rate-limit.conf

limit_req_zone $binary_remote_addr zone=api_per_ip:20m rate=20r/s;
limit_req_zone $binary_remote_addr zone=api_write_per_ip:20m rate=8r/s;
limit_req_zone $binary_remote_addr zone=ws_handshake_per_ip:20m rate=8r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:20m;

# suspicious crawler user-agent detection
map $http_user_agent $block_bad_ua {
    default 0;
    "" 1;
    "~*sqlmap|nmap|masscan|nikto|acunetix|python-requests|apachebench|scrapy|curl/" 1;
}
